{% extends 'users/userbase.html' %}

{% block title %}
View Dataset
{% endblock %}

{% block content %}
<link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
<style>
    .dataset-container {
        background: var(--glass-bg);
        backdrop-filter: blur(16px);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        border: 1px solid var(--glass-border);
        margin: 40px auto;
        position: relative;
        overflow: hidden;
    }

    .dataset-container::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 4px;
        background: linear-gradient(to right, #60a5fa, #3b82f6);
    }

    .section-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .section-title {
        font-family: 'Outfit', sans-serif;
        font-size: 2.2rem;
        font-weight: 700;
        color: var(--text-main);
    }

    .section-title i {
        color: var(--primary-cyan);
        text-shadow: 0 0 15px rgba(6, 182, 212, 0.5);
    }

    /* Dark Mode Overrides for DataTables */
    .dataTables_wrapper .dataTables_length,
    .dataTables_wrapper .dataTables_filter,
    .dataTables_wrapper .dataTables_info,
    .dataTables_wrapper .dataTables_processing,
    .dataTables_wrapper .dataTables_paginate {
        color: var(--text-muted) !important;
        margin-bottom: 15px;
    }

    .dataTables_wrapper .dataTables_filter input {
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text-main);
        border-radius: 8px;
        padding: 5px 10px;
        margin-left: 10px;
    }

    .dataTables_wrapper .dataTables_length select {
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text-main);
        border-radius: 5px;
    }

    table.dataTable {
        width: 100% !important;
        border-collapse: collapse !important;
        background: rgba(15, 23, 42, 0.5);
        color: var(--text-main);
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 20px !important;
    }

    table.dataTable thead th {
        background: rgba(255, 255, 255, 0.1);
        color: var(--primary-cyan);
        border-bottom: 2px solid var(--glass-border) !important;
        padding: 15px;
        font-family: 'Outfit', sans-serif;
        font-weight: 600;
    }

    table.dataTable tbody td {
        padding: 12px 15px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;
        background: transparent !important;
    }

    table.dataTable.row-border tbody th,
    table.dataTable.row-border tbody td,
    table.dataTable.display tbody th,
    table.dataTable.display tbody td {
        border-top: none;
    }

    table.dataTable tbody tr.odd {
        background-color: rgba(255, 255, 255, 0.02) !important;
    }
    
    table.dataTable tbody tr:hover {
        background-color: rgba(255, 255, 255, 0.05) !important;
    }

    .dataTables_wrapper .dataTables_paginate .paginate_button {
        color: var(--text-main) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        background: rgba(15, 23, 42, 0.6) !important;
        border-radius: 5px;
    }

    .dataTables_wrapper .dataTables_paginate .paginate_button.current,
    .dataTables_wrapper .dataTables_paginate .paginate_button.current:hover {
        color: white !important;
        border: 1px solid var(--primary-cyan) !important;
        background: linear-gradient(to bottom, #06b6d4 0%, #3b82f6 100%) !important;
    }

    .dataTables_wrapper .dataTables_paginate .paginate_button:hover {
        color: white !important;
        background: rgba(255, 255, 255, 0.1) !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
    }
</style>

<div class="dataset-container animate__animated animate__fadeInUp">
    <div class="section-header">
        <h2 class="section-title"><i class="fas fa-database me-3"></i>Dataset Explorer</h2>
        <p class="text-muted mt-2">Browse the historical market data used to train our AI models for exact predictions.</p>
    </div>

    <div class="row">
        <div class="col-12" style="overflow-x: auto;">
            {{ data|safe }}
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script type="text/javascript">
    $(document).ready(function() {
        $('table').DataTable({
            "pageLength": 50,
            "responsive": true,
            "language": {
                "search": "_INPUT_",
                "searchPlaceholder": "Search dataset..."
            }
        });
    });
</script>
{% endblock %}
