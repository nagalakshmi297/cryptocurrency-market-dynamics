{% extends 'users/userbase.html' %}

{% block title %}
Train Models
{% endblock %}

{% block content %}
<style>
    .train-container {
        width: 100%;
        max-width: 900px;
        background: var(--glass-bg);
        backdrop-filter: blur(16px);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        border: 1px solid var(--glass-border);
        text-align: center;
        margin: 40px auto;
        position: relative;
        overflow: hidden;
    }

    .train-container::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 4px;
        background: linear-gradient(to right, #8b5cf6, var(--primary-cyan));
    }

    .train-title {
        font-family: 'Outfit', sans-serif;
        font-size: 2.2rem;
        margin-bottom: 30px;
        font-weight: 700;
        color: var(--text-main);
    }

    .train-title i {
        color: #8b5cf6;
        margin-right: 12px;
        text-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
    }

    .train-button {
        padding: 14px 35px;
        border: none;
        border-radius: 30px;
        background: linear-gradient(45deg, #8b5cf6, var(--primary-blue));
        color: white;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 5px 15px rgba(139, 92, 246, 0.3);
    }

    .train-button:hover {
        transform: translateY(-3px) scale(1.05);
        box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5);
    }

    /* Style the HTML table emitted from dataframe metrics */
    .table-wrapper {
        overflow-x: auto;
        margin-top: 40px;
        border-radius: 12px;
        border: 1px solid var(--glass-border);
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: rgba(15, 23, 42, 0.5);
        text-align: center;
    }

    th {
        background: rgba(255, 255, 255, 0.1);
        padding: 15px;
        color: var(--primary-cyan);
        font-family: 'Outfit', sans-serif;
        font-weight: 600;
        font-size: 1.1em;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    td {
        padding: 15px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        color: var(--text-main);
    }

    tr:last-child td {
        border-bottom: none;
    }

    tr:hover td {
        background: rgba(255, 255, 255, 0.05);
    }
</style>

<div class="train-container animate__animated animate__fadeInUp">
    <h2 class="train-title"><i class="fas fa-microchip"></i>Train Machine Learning Models</h2>
    
    <div class="train-btn-area">
        <form method="post">
            {% csrf_token %}
            <div style="margin-bottom: 25px;">
                <label style="color: var(--text-main); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1.1rem;">
                    <input type="checkbox" name="refresh_data" style="width: 20px; height: 20px; accent-color: var(--primary-cyan);">
                    <span style="opacity: 0.9;">Refresh 1-Year Data from YFinance</span>
                </label>
                <p style="color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-top: 8px;">
                    <i class="fas fa-info-circle me-1"></i> This replaces the local CSV with fresh live data.
                </p>
            </div>
            <button type="submit" class="train-button">
                <i class="fas fa-play me-2"></i> Ignite Training Process
            </button>
        </form>
    </div>
    
    {% if metrics %}
    <div class="table-wrapper animate__animated animate__fadeIn" style="animation-delay: 0.3s;">
        {{ metrics|safe }}
    </div>
    {% endif %}
</div>
{% endblock %}
