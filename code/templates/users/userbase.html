{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>User Dashboard - CryptoPredictor</title>

<link rel="icon" href="{% static 'images/favicon.png' %}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* CORE STYLES */
:root {
    --bg-dark: #0f172a;
    --bg-darker: #020617;
    --primary-cyan: #06b6d4;
    --primary-blue: #3b82f6;
    --accent-purple: #8b5cf6;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --glass-bg: rgba(30, 41, 59, 0.7);
    --glass-border: rgba(255, 255, 255, 0.1);
    --card-bg: rgba(15, 23, 42, 0.6);
}

body {
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top right, var(--bg-dark), var(--bg-darker));
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    margin: 0;
    overflow-x: hidden;
}

/* DECORATIVE BACKGROUND BLOBS */
.bg-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    z-index: -1;
    opacity: 0.3;
}
.blob-1 {
    top: -10%; left: -10%;
    width: 600px; height: 600px;
    background: var(--primary-blue);
}
.blob-2 {
    bottom: -10%; right: -5%;
    width: 500px; height: 500px;
    background: var(--primary-cyan);
}

/* NAVBAR GLASSMORPHISM */
.navbar {
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--glass-border);
    padding: 12px 0;
    transition: all 0.3s ease;
}

.navbar-brand {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 1.5rem;
    color: var(--text-main) !important;
    display: flex;
    align-items: center;
    gap: 10px;
}

.navbar-brand i {
    color: var(--primary-cyan);
    font-size: 1.8rem;
    animation: pulse 2s infinite;
}

.nav-link {
    font-weight: 500;
    color: var(--text-muted) !important;
    padding: 8px 16px !important;
    border-radius: 8px;
    transition: all 0.3s ease;
    margin: 0 3px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.nav-link:hover, .nav-item.active .nav-link {
    color: var(--text-main) !important;
    background: rgba(255, 255, 255, 0.05);
    transform: translateY(-2px);
}

.btn-logout {
    background: rgba(239, 68, 68, 0.1);
    color: #fca5a5 !important;
    border: 1px solid rgba(239, 68, 68, 0.2);
    padding: 8px 16px;
    border-radius: 8px;
    transition: all 0.3s ease;
}

.btn-logout:hover {
    background: rgba(239, 68, 68, 0.2);
    color: white !important;
    transform: translateY(-2px);
}

/* MAIN CONTENT */
.main-wrapper {
    flex: 1;
    margin-top: 80px; /* Offset for fixed navbar */
    padding: 30px 0;
}

/* FOOTER */
.footer {
    background: rgba(2, 6, 23, 0.8);
    border-top: 1px solid var(--glass-border);
    padding: 20px 0;
    text-align: center;
    margin-top: auto;
}

/* BACK TO TOP */
.back-to-top {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 45px;
    height: 45px;
    background: var(--primary-blue);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    font-size: 1.2rem;
    box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
    z-index: 1000;
}

.back-to-top.active {
    opacity: 1;
    visibility: visible;
}

.back-to-top:hover {
    background: var(--primary-cyan);
    color: white;
    transform: translateY(-3px);
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); filter: drop-shadow(0 0 8px var(--primary-cyan)); }
    100% { transform: scale(1); }
}

@media (max-width: 991px) {
    .navbar-collapse {
        background: var(--bg-darker);
        padding: 15px;
        border-radius: 10px;
        margin-top: 10px;
        border: 1px solid var(--glass-border);
    }
}
</style>

</head>

<body>

<div class="bg-blob blob-1"></div>
<div class="bg-blob blob-2"></div>

<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand" href="{% url 'UserHome' %}">
            <i class="fa-brands fa-bitcoin"></i>
            Crypto<span style="color: var(--text-main);">Predict</span>
        </a>
        <button class="navbar-toggler navbar-dark border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'UserHome' %}">
                        <i class="fas fa-home"></i> Home
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'train_crypto_models' %}">
                        <i class="fas fa-cogs"></i> Training
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'predict_market_cap' %}#live">
                        <i class="fas fa-bolt"></i> Live Prediction
                    </a>
                </li>
                <li class="nav-item ms-lg-3 mt-3 mt-lg-0">
                    <a class="nav-link btn-logout" href="{% url 'index' %}">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="main-wrapper animate__animated animate__fadeIn">
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</main>

<a href="#" class="back-to-top">
    <i class="fas fa-chevron-up"></i>
</a>

<footer class="footer">
    <div class="container">
        <div class="text-muted">
            &copy; 2026 Cryptocurrency Price Prediction. All rights reserved.
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const backToTop = document.querySelector('.back-to-top');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 300) {
            backToTop.classList.add('active');
        } else {
            backToTop.classList.remove('active');
        }
    });
    backToTop.addEventListener('click', (e) => {
        e.preventDefault();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
</script>

</body>
</html>
