{% extends 'users/userbase.html' %}

{% block title %}
Crypto Prediction
{% endblock %}

{% block content %}
<style>
    .predict-wrapper {
        position: relative;
        width: 100%;
        min-height: 80vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
        z-index: 10;
        margin-top: 20px;
    }

    #coins-container,
    #moneybag-coins-container {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        z-index: -1;
    }



    .coin {
        position: absolute;
        width: 40px;
        height: 40px;
        background-size: contain;
        background-repeat: no-repeat;
        animation: flow 8s linear infinite;
        opacity: 0.8;
    }

    .moneybag-coin {
        position: absolute;
        font-size: 30px;
        animation: flow 8s linear infinite;
        opacity: 0.9;
    }

    @keyframes flow {
        0% { transform: translate(-50px, 100vh) rotate(0deg); }
        100% { transform: translate(100vw, -100px) rotate(360deg); }
    }

    @media(max-width: 768px) {
        .form-container {
            padding: 25px;
        }
    }

    /* --- NEW LIVE DASHBOARD STYLES --- */
    .live-dashboard {
        width: 100%;
        max-width: 1000px;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 30px;
        margin-bottom: 40px;
        box-shadow: var(--shadow-xl);
    }

    .live-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 30px;
        flex-wrap: wrap;
        gap: 20px;
    }

    .price-main {
        display: flex;
        flex-direction: column;
    }

    .price-title {
        color: var(--text-muted);
        font-size: 1.1rem;
        font-weight: 500;
        margin-bottom: 5px;
    }

    .price-value {
        font-size: 3rem;
        font-weight: 800;
        color: #fff;
        line-height: 1;
        font-family: 'Outfit', sans-serif;
    }

    .price-change {
        font-size: 1.2rem;
        font-weight: 600;
        margin-top: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .change-up { color: #10b981; }
    .change-down { color: #ef4444; }

    .last-updated {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin-top: 10px;
    }

    .live-controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
        background: rgba(255, 255, 255, 0.03);
        padding: 20px;
        border-radius: 16px;
    }

    .control-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .control-label {
        color: var(--text-muted);
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .dashboard-select, .dashboard-input {
        background: rgba(15, 23, 42, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 12px 15px;
        color: #fff;
        font-size: 1rem;
        outline: none;
        transition: 0.3s;
    }

    .dashboard-select:focus, .dashboard-input:focus {
        border-color: #00f7ff;
        background: rgba(15, 23, 42, 0.8);
    }

    .time-tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        overflow-x: auto;
        padding-bottom: 5px;
    }

    .time-tab {
        padding: 8px 16px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.05);
        color: var(--text-muted);
        cursor: pointer;
        font-weight: 600;
        transition: 0.3s;
        white-space: nowrap;
    }

    .time-tab:hover {
        background: rgba(255, 255, 255, 0.1);
    }

    .time-tab.active {
        background: #fff;
        color: #020617;
        border-color: #fff;
    }

    #livechart-container {
        min-height: 400px;
        width: 100%;
    }

    .prediction-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 12px;
        border-radius: 20px;
        background: rgba(0, 247, 255, 0.1);
        border: 1px solid rgba(0, 247, 255, 0.3);
        color: #00f7ff;
        font-weight: 600;
        font-size: 0.9rem;
        margin-bottom: 15px;
    }

    #toggle-live-prediction {
        margin-bottom: 30px;
        padding: 12px 24px;
        background: linear-gradient(45deg, #00f7ff, #007cf0);
        border: none;
        border-radius: 12px;
        color: #020617;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        align-items: center;
        gap: 10px;
        font-family: 'Outfit', sans-serif;
    }

    #toggle-live-prediction:hover {
        box-shadow: 0 0 20px rgba(0, 247, 255, 0.5);
        transform: scale(1.05);
    }

    /* Signal Badges */
    .market-signal {
        padding: 5px 12px;
        border-radius: 8px;
        font-weight: 800;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 1px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 10px;
    }

    .signal-strong-buy { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.4); box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }
    .signal-buy { background: rgba(52, 211, 153, 0.15); color: #34d399; border: 1px solid rgba(52, 211, 153, 0.3); }
    .signal-strong-sell { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.4); box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); }
    .signal-sell { background: rgba(248, 113, 113, 0.15); color: #f87171; border: 1px solid rgba(248, 113, 113, 0.3); }
    .signal-neutral { background: rgba(148, 163, 184, 0.15); color: #94a3b8; border: 1px solid rgba(148, 163, 184, 0.3); }

    .pulse-signal {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: currentColor;
        display: inline-block;
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.4; transform: scale(1.3); }
        100% { opacity: 1; transform: scale(1); }
    }
</style>

<div class="predict-wrapper">
    <div id="coins-container"></div>
    <div id="moneybag-coins-container"></div>

    <!-- ✅ DASHBOARD SECTION -->
    <div class="live-dashboard" id="live-dashboard">
        <div class="live-header">
            <div class="price-main">
                <span class="price-title" id="asset-label">Bitcoin Price (BTC)</span>
                <div class="price-value" id="current-price">$0.00</div>
                <div class="price-change" id="price-change">
                    <span id="change-val">+0.00%</span>
                    <i id="change-icon" class="fas fa-caret-up"></i>
                </div>
                <div class="last-updated" id="last-updated">Last updated: Just now</div>
            </div>
            <div class="prediction-info">
                <div class="prediction-badge">
                    <i class="fas fa-brain"></i>
                    <span>AI Prediction</span>
                </div>
                <div class="price-value" style="font-size: 2rem; color: #00f7ff;" id="predicted-price">$0.00</div>
                <div style="color: var(--text-muted); font-size: 0.8rem;">Forecasted Next Interval</div>
                <div id="signal-badge-container">
                    <div class="market-signal signal-neutral" id="market-signal">
                        <span class="pulse-signal"></span>
                        <span id="signal-text">Neutral / Hold</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="live-controls">
            <div class="control-group">
                <label class="control-label">Select Asset</label>
                <select id="asset-selector" class="dashboard-select">
                    <option value="BTC" selected>Bitcoin (BTC)</option>
                    <option value="ETH">Ethereum (ETH)</option>
                    <option value="SOL">Solana (SOL)</option>
                    <option value="BNB">Binance Coin (BNB)</option>
                    <option value="XRP">Ripple (XRP)</option>
                </select>
            </div>
            <div class="control-group">
                <label class="control-label">Fiat Currency</label>
                <select id="fiat-selector" class="dashboard-select">
                    <option value="USD" selected>US Dollar (USD)</option>
                    <option value="EUR">Euro (EUR)</option>
                    <option value="INR">Indian Rupee (INR)</option>
                    <option value="GBP">British Pound (GBP)</option>
                </select>
            </div>
            <div class="control-group">
                <label class="control-label">Amount (<span class="symbol-text">BTC</span>)</label>
                <input type="number" id="crypto-amount" class="dashboard-input" value="1" step="any">
            </div>
            <div class="control-group">
                <label class="control-label">Value (<span class="fiat-text">USD</span>)</label>
                <input type="number" id="fiat-amount" class="dashboard-input" value="0" step="any">
            </div>
        </div>

        <div class="time-tabs" id="time-tabs">
            <button class="time-tab active" data-period="1d">1D</button>
            <button class="time-tab" data-period="5d">5D</button>
            <button class="time-tab" data-period="1mo">1M</button>
            <button class="time-tab" data-period="1y">1Y</button>
            <button class="time-tab" data-period="5y">5Y</button>
            <button class="time-tab" data-period="max">Max</button>
        </div>

        <div id="livechart-container"></div>
    </div>



</div>

<!-- ✅ Chart.js & ApexCharts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

<script>

// --- ✅ NEW LIVE DASHBOARD LOGIC ---
document.addEventListener("DOMContentLoaded", function() {
    let liveChart;
    let currentPrice = 0;
    
    const dashboard = {
        asset: 'BTC',
        fiat: 'USD',
        period: '1d',
        
        async fetchData() {
            try {
                const response = await fetch(`/api/live-prediction/?symbol=${this.asset}&fiat=${this.fiat}&period=${this.period}`);
                const data = await response.json();
                
                if (data.error) throw new Error(data.error);
                
                this.updateUI(data);
                this.updateChart(data);
                currentPrice = data.current_price;
                this.updateConversion();
                
            } catch (err) {
                console.error("Live fetch error:", err);
            }
        },
        
        updateUI(data) {
            document.getElementById('asset-label').innerText = `${data.symbol} Price (${data.symbol})`;
            
            const fiatSymbol = this.fiat === 'INR' ? '₹' : this.fiat === 'EUR' ? '€' : this.fiat === 'GBP' ? '£' : '$';
            document.getElementById('current-price').innerText = `${fiatSymbol}${data.current_price.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            
            const changeEl = document.getElementById('price-change');
            const changeVal = document.getElementById('change-val');
            const changeIcon = document.getElementById('change-icon');
            
            const pct = data.price_change_pct;
            changeVal.innerText = `${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%`;
            
            if (pct >= 0) {
                changeEl.className = 'price-change change-up';
                changeIcon.className = 'fas fa-caret-up';
            } else {
                changeEl.className = 'price-change change-down';
                changeIcon.className = 'fas fa-caret-down';
            }
            
            document.getElementById('predicted-price').innerText = `${fiatSymbol}${data.predictions[0].toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('last-updated').innerText = `Last updated: ${data.last_updated}`;
            
            // Update Signal Badge
            const signalBadge = document.getElementById('market-signal');
            const signalText = document.getElementById('signal-text');
            signalText.innerText = data.recommendation;
            signalBadge.className = `market-signal signal-${data.signal_type}`;
            
            // Update conversion labels
            document.querySelectorAll('.symbol-text').forEach(el => el.innerText = data.symbol);
            document.querySelectorAll('.fiat-text').forEach(el => el.innerText = data.fiat);
        },
        
        updateChart(data) {
            const historicalData = data.prices.map((p, i) => ({
                x: new Date(data.timestamps[i]).getTime(),
                y: p
            }));
            
            // Generate future points (Specifically 24h apart for a 5-day forecast)
            const lastTime = new Date(data.timestamps[data.timestamps.length - 1]).getTime();
            const dayInMs = 86400000; 
            
            // The forecast series starts from the last historical point
            const forecastSeries = [{
                x: lastTime,
                y: data.prices[data.prices.length - 1]
            }];
            
            data.predictions.forEach((p, i) => {
                forecastSeries.push({
                    x: lastTime + (dayInMs * (i + 1)),
                    y: p
                });
            });
            
            const isUp = data.price_change_pct >= 0;
            const themeColor = isUp ? '#10b981' : '#ef4444';
            
            const series = [
                { name: 'Actual', data: historicalData },
                { name: 'Predicted', data: forecastSeries }
            ];
            
            if (!liveChart) {
                const options = {
                    series: series,
                    chart: {
                        type: 'area',
                        height: 400,
                        toolbar: { show: false },
                        zoom: { enabled: false },
                        animations: { enabled: true, easing: 'easeinout', speed: 800 }
                    },
                    dataLabels: { enabled: false },
                    stroke: { 
                        curve: 'smooth', 
                        width: [3, 3], 
                        dashArray: [0, 5],
                        colors: [themeColor, '#00f7ff'] 
                    },
                    fill: {
                        type: 'gradient',
                        gradient: {
                            shadeIntensity: 1,
                            opacityFrom: 0.45,
                            opacityTo: 0.05,
                            stops: [20, 100],
                            colorStops: [
                                { offset: 0, color: themeColor, opacity: 0.4 }, 
                                { offset: 100, color: themeColor, opacity: 0.1 }
                            ]
                        }
                    },
                    markers: { size: [0, 4] },
                    xaxis: {
                        type: 'datetime',
                        axisBorder: { show: false },
                        axisTicks: { show: false },
                        labels: { style: { colors: '#94a3b8' } }
                    },
                    yaxis: {
                        labels: { style: { colors: '#94a3b8' }, formatter: (val) => val.toLocaleString() }
                    },
                    grid: { borderColor: 'rgba(255,255,255,0.05)' },
                    tooltip: { theme: 'dark', x: { format: 'dd MMM yyyy HH:mm' } },
                    colors: [themeColor, '#00f7ff']
                };
                liveChart = new ApexCharts(document.querySelector("#livechart-container"), options);
                liveChart.render();
            } else {
                liveChart.updateOptions({
                    stroke: { colors: [themeColor, '#00f7ff'] },
                    fill: { colorStops: [{ offset: 0, color: themeColor, opacity: 0.4 }, { offset: 100, color: themeColor, opacity: 0.1 }] }
                });
                liveChart.updateSeries(series);
            }
        },
        
        updateConversion() {
            const cryptoInput = document.getElementById('crypto-amount');
            const fiatInput = document.getElementById('fiat-amount');
            if(document.activeElement !== fiatInput) {
                fiatInput.value = (parseFloat(cryptoInput.value || 0) * currentPrice).toFixed(2);
            }
        }
    };
    
    document.getElementById('asset-selector').addEventListener('change', (e) => {
        dashboard.asset = e.target.value;
        dashboard.fetchData();
    });
    
    document.getElementById('fiat-selector').addEventListener('change', (e) => {
        dashboard.fiat = e.target.value;
        dashboard.fetchData();
    });
    
    document.getElementById('time-tabs').addEventListener('click', (e) => {
        if (e.target.classList.contains('time-tab')) {
            document.querySelectorAll('.time-tab').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            dashboard.period = e.target.dataset.period;
            dashboard.fetchData();
        }
    });
    
    // Always show the live dashboard and load data immediately
    const liveDash = document.getElementById('live-dashboard');
    liveDash.style.display = 'block';
    liveDash.classList.add('animate__animated', 'animate__fadeInDown');
    dashboard.fetchData();
    
    setInterval(() => {
        if(document.getElementById('live-dashboard').style.display !== 'none') {
            dashboard.fetchData();
        }
    }, 60000);
});

// 🎯 ANIMATION
const coinsContainer = document.getElementById('coins-container');
const moneybagCoinsContainer = document.getElementById('moneybag-coins-container');

const coins = [
    'https://cryptologos.cc/logos/bitcoin-btc-logo.png',
    'https://cryptologos.cc/logos/ethereum-eth-logo.png',
    'https://cryptologos.cc/logos/xrp-xrp-logo.png'
];

function createCoin(){
    const coin = document.createElement('div');
    coin.className = 'coin';
    coin.style.backgroundImage = `url(${coins[Math.floor(Math.random()*coins.length)]})`;
    coin.style.left = Math.random() * window.innerWidth + 'px';
    coin.style.animationDuration = (Math.random() * 4 + 6) + 's';
    coinsContainer.appendChild(coin);
    setTimeout(() => coin.remove(), 10000);
}

function createMoneybag(){
    const coin = document.createElement('div');
    coin.className = 'moneybag-coin';
    coin.innerHTML = '💰';
    coin.style.left = Math.random() * window.innerWidth + 'px';
    coin.style.animationDuration = (Math.random() * 4 + 6) + 's';
    moneybagCoinsContainer.appendChild(coin);
    setTimeout(() => coin.remove(), 10000);
}

setInterval(() => {
    createCoin();
    if(Math.random() < 0.3){
        createMoneybag();
    }
}, 800);
</script>
{% endblock %}
